# Label PRs based on changed paths

"ai":
  - changed-files:
      - any-glob-to-any-file: ["src/ai/**"]

"tui":
  - changed-files:
      - any-glob-to-any-file: ["src/tui/**"]

"tools":
  - changed-files:
      - any-glob-to-any-file: ["src/tools/**"]

"session":
  - changed-files:
      - any-glob-to-any-file: ["src/session/**"]

"agent":
  - changed-files:
      - any-glob-to-any-file: ["src/agent/**"]

"config":
  - changed-files:
      - any-glob-to-any-file: ["src/config.rs"]

"cli":
  - changed-files:
      - any-glob-to-any-file: ["src/main.rs"]

"documentation":
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "*.md"]

"ci":
  - changed-files:
      - any-glob-to-any-file: [".github/**"]

"packaging":
  - changed-files:
      - any-glob-to-any-file: ["packaging/**", "Cargo.toml"]
