name: Stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is further activity.
          stale-pr-message: >
            This PR has been inactive for 60 days. It will be closed in 14 days
            unless there is further activity.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen if
            the issue persists.
          close-pr-message: >
            This PR has been closed due to inactivity. Please reopen if you plan
            to continue working on it.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: bug,security,enhancement,pinned
          exempt-pr-labels: pinned,dependencies
